<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awesome Correlation Game</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #059669;
      --border: #d1d5db;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .game-card {
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .status-left,
    .status-right {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .badge {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: bold;
    }

    .lives {
      display: flex;
      gap: 6px;
      font-size: 1.8rem;
    }

    .heart {
      transition: opacity 0.3s ease;
    }

    .heart.inactive {
      opacity: 0.2;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 24px;
    }

    .plot-panel,
    .control-panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
    }

    canvas {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      background: #fcfcfd;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input[type="range"] {
      width: 100%;
      margin: 10px 0 6px;
    }

    .guess-display {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .secondary:hover:not(:disabled) {
      background: #d1d5db;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .result-box {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid var(--border);
      min-height: 98px;
      line-height: 1.55;
    }

    .result-box strong {
      font-size: 1.05rem;
    }

    .success {
      color: var(--success);
    }

    .danger {
      color: var(--danger);
    }

    .info-list {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .game-over {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-weight: bold;
    }

    .nudge {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: #111827;
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      font-weight: bold;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .nudge.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="game-card">
      <div class="status-bar">
        <div class="status-left">
          <div class="badge">Runde: <span id="round">1</span></div>
          <div class="badge">Punkte: <span id="score">0</span></div>
          <div class="badge">Neustarts: <span id="restarts">0</span></div>
        </div>
        <div class="status-right">
          <div><span class="lives" id="lives">
              <span class="heart">❤</span>
              <span class="heart">❤</span>
              <span class="heart">❤</span>
              <span class="heart">❤</span>
              <span class="heart">❤</span>
              <span class="heart">❤</span>
              <span class="heart">❤</span>
            </span></div>
        </div>
      </div>

      <div class="layout">
        <div class="plot-panel">
          <canvas id="plotCanvas" width="520" height="520"></canvas>
        </div>

        <div class="control-panel">
          <label for="guessSlider">Deine Schätzung:</label>
          <div class="guess-display" id="guessValue">0.00</div>
          <input id="guessSlider" type="range" min="-1" max="1" step="0.01" value="0" />

          <div class="button-row">
            <button id="checkButton" class="primary">Schätzung prüfen</button>
            <button id="nextButton" class="secondary" disabled>Nächste Runde</button>
            <button id="restartButton" class="secondary">Neustart</button>
          </div>
          <div class="result-box" id="resultBox">
            Korrelationskoeffizient: <strong>--</strong><br>Abweichung: <strong>--</strong>
          </div>

          <div id="gameOverBox"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="nudge" class="nudge"></div>

  <script>
    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');

    const guessSlider = document.getElementById('guessSlider');
    const guessValue = document.getElementById('guessValue');
    const checkButton = document.getElementById('checkButton');
    const nextButton = document.getElementById('nextButton');
    const restartButton = document.getElementById('restartButton');

    const roundSpan = document.getElementById('round');
    const scoreSpan = document.getElementById('score');
    const restartsSpan = document.getElementById('restarts');
    const livesSpan = document.getElementById('lives');
    const resultBox = document.getElementById('resultBox');
    const gameOverBox = document.getElementById('gameOverBox');
    const nudgeBox = document.getElementById('nudge');

    let score = 0;
    let lives = 7;
    let round = 1;
    let restartCount = 0;
    let currentR = 0;
    let currentPoints = [];
    let roundActive = true;
    let nudgeTimeout = null;
    const shownNudges = new Set();

    function updateGuessDisplay() {
      guessValue.textContent = Number(guessSlider.value).toFixed(2);
    }

    function updateStatus() {
      roundSpan.textContent = round;
      scoreSpan.textContent = score;
      restartsSpan.textContent = restartCount;

      const hearts = livesSpan.querySelectorAll('.heart');
      hearts.forEach((heart, index) => {
        if (index < lives) {
          heart.classList.remove('inactive');
        } else {
          heart.classList.add('inactive');
        }
      });
    }

    function randomCorrelation() {
      let r;
      do {
        r = Math.random() * 2 - 1;
      } while (Math.abs(r) < 0.05);
      return r;
    }

    function randomNormal() {
      let u = 0;
      let v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    function generateCorrelatedPoints(r, n = 28) {
      const points = [];
      const scale = 75;

      for (let i = 0; i < n; i++) {
        const x = randomNormal();
        const z = randomNormal();
        const y = r * x + Math.sqrt(1 - r * r) * z;
        points.push({ x, y });
      }

      return points.map(p => ({
        x: canvas.width / 2 + p.x * scale,
        y: canvas.height / 2 - p.y * scale
      }));
    }

    function drawAxes() {
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(40, canvas.height / 2);
      ctx.lineTo(canvas.width - 40, canvas.height / 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 40);
      ctx.lineTo(canvas.width / 2, canvas.height - 40);
      ctx.stroke();
    }

    function drawPoints(points) {
      ctx.fillStyle = '#2563eb';
      for (const point of points) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPlot() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fcfcfd';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawAxes();
      drawPoints(currentPoints);
    }

    function showNudge(message) {
      if (!nudgeBox) {
        return;
      }

      if (nudgeTimeout) {
        clearTimeout(nudgeTimeout);
      }

      nudgeBox.textContent = message;
      nudgeBox.classList.add('show');

      nudgeTimeout = setTimeout(() => {
        nudgeBox.classList.remove('show');
      }, 2200);
    }

    function maybeShowScoreNudge() {
      if (score > 0 && !shownNudges.has('first_points')) {
        shownNudges.add('first_points');
        showNudge('Prima, weiter so!');
        return;
      }

      if (score >= 5 && !shownNudges.has('five_points')) {
        shownNudges.add('five_points');
        showNudge('Das sind schon fünf Punkte, auf zu den nächsten fünf!');
        return;
      }

      if (score >= 10 && !shownNudges.has('ten_points')) {
        shownNudges.add('ten_points');
        showNudge('Zehn Punkte erreicht – stark gemacht!');
        return;
      }
    }

    function startRound() {
      currentR = randomCorrelation();
      currentPoints = generateCorrelatedPoints(currentR);
      drawPlot();

      roundActive = true;
      checkButton.disabled = false;
      nextButton.disabled = true;
      resultBox.innerHTML = 'Korrelationskoeffizient: <strong>--</strong><br>Abweichung: <strong>--</strong>';
      gameOverBox.innerHTML = '';
    }

      function evaluateGuess() {
      if (!roundActive || lives <= 0) {
        return;
      }

      const guess = Number(guessSlider.value);
      const diff = Math.abs(guess - currentR);

      let pointsAwarded = 0;
      let lifeLost = false;

      if (diff <= 0.01) {
        pointsAwarded = 3;
      } else if (diff <= 0.05) {
        pointsAwarded = 2;
      } else if (diff <= 0.10) {
        pointsAwarded = 1;
      } else {
        lives -= 1;
        lifeLost = true;
      }

      score += pointsAwarded;
      updateStatus();

      if (pointsAwarded > 0) {
        maybeShowScoreNudge();
      }

      const actual = currentR.toFixed(2);
      const deviation = diff.toFixed(2);

      if (lifeLost) {
        resultBox.innerHTML = `
          Korrelationskoeffizient: <strong>${actual}</strong><br>
          Abweichung: <strong>${deviation}</strong><br>
        `;
      } else {
        resultBox.innerHTML = `
          Korrelationskoeffizient: <strong>${actual}</strong><br>
          Abweichung: <strong>${deviation}</strong>
        `;
      }

      roundActive = false;
      checkButton.disabled = true;

      if (lives <= 0) {
        nextButton.disabled = true;
        gameOverBox.innerHTML = `<div class="game-over">Alle Leben verloren.<p>Du hast ${score} Punkt${score === 1 ? '' : 'e'} erreicht.</div>`;
      } else {
        nextButton.disabled = false;
      }
    }

    function nextRound() {
      if (lives <= 0) {
        return;
      }
      round += 1;
      updateStatus();
      startRound();
    }

    function restartGame() {
      restartCount += 1;
      score = 0;
      lives = 7;
      round = 1;
      shownNudges.clear();
      guessSlider.value = 0;
      updateGuessDisplay();
      updateStatus();
      nudgeBox.classList.remove('show');
      startRound();
    }

    guessSlider.addEventListener('input', updateGuessDisplay);
    checkButton.addEventListener('click', evaluateGuess);
    nextButton.addEventListener('click', nextRound);
    restartButton.addEventListener('click', restartGame);

    updateGuessDisplay();
    updateStatus();
    startRound();
  </script>
</body>
</html>
